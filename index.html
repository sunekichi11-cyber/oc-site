<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- スマホでも見やすくする設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Original Characters</title>

  <!-- CSSファイルを読み込む -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>MY ORIGINAL CHARACTERS</h1>
    <p>自分のオリジナルキャラクター紹介サイト</p>
  </header>

  <main>

    <!-- キャラ選択ボタン -->
    <section class="character-buttons">
      <button onclick="showCharacter('vesperion')">
        ヴェスペリオン
      </button>

      <button onclick="showCharacter('sakuraviel')">
        サクラヴィエル
      </button>
    </section>

    <!-- キャラクター表示エリア -->
    <section class="character-card">

      <div class="character-image-area">
        <img
          id="character-image"
          src="images/vesperion.png"
          alt="キャラクター立ち絵"
        >
      </div>

      <div class="character-info">
        <p id="character-title" class="character-title">
          深紅薔薇の執行者
        </p>

        <h2 id="character-name">
          Vespellion Dreadrose
        </h2>

        <p id="character-name-jp">
          ヴェスペリオン・ドレッドローズ
        </p>

        <div class="profile">
          <p>
            <span>性別</span>
            <strong id="character-gender">男</strong>
          </p>

          <p>
            <span>身長</span>
            <strong id="character-height">257cm</strong>
          </p>

          <p>
            <span>所属</span>
            <strong id="character-group">DREAD CATHEDRAL</strong>
          </p>

          <p>
            <span>モチーフ</span>
            <strong id="character-motif">
              宇宙・神父・軍人・薔薇
            </strong>
          </p>
        </div>

        <h3>キャラクター紹介</h3>

        <p id="character-description">
          銀河中で恐れられている軍人神父。
          無口で無表情だが、圧倒的な戦闘力と威圧感を持つ。
        </p>
      </div>

    </section>

  </main>

  <footer>
    <p>© My Original Character Site</p>
  </footer>

  <!-- JavaScriptファイルを読み込む -->
  <script src="script.js"></script>

</body>
</html>
