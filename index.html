<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <!-- スマホでも見やすくする設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Original Characters</title>

  <!-- CSSファイルを読み込む -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>MY ORIGINAL CHARACTERS</h1>
    <p>自分のオリジナルキャラクター紹介サイト</p>
  </header>

  <main>

    <!-- キャラ選択ボタン -->
    <section class="character-buttons">
      <button onclick="showCharacter('ravi')">
        ラヴィ
      </button>

      <button onclick="showCharacter('zeal')">
        ジール
      </button>
    </section>

    <!-- キャラクター選択 -->
<section class="character-selector">
  <h2>CHARACTERS</h2>
  <p class="selector-description">
    アイコンを選択してください
  </p>

  <div class="character-icon-list">

    <!-- Ravi -->
    <button
      class="character-icon-button active"
      data-character="ravi"
      aria-label="Raviを表示"
    >
      <img
        src="./images/icons/ravi-icon.png"
        alt="Raviのアイコン"
      >

      <span>Ravi</span>
    </button>

  </div>
</section>

    <!-- キャラクター表示エリア -->
    <section class="character-card">

      <div class="character-image-area">
        <img
          id="character-image"
          src="images/ravi.png"
          alt="キャラクター立ち絵"
        >
      </div>

      <div class="character-info">
        <p id="character-title" class="character-title">
          The Silent Observer
        </p>

        <h2 id="character-name">
          Ravi
        </h2>

        <p id="character-name-jp">
          ラヴィ
        </p>

        <div class="profile">
          <p>
            <span>性別</span>
            <strong id="character-gender">男</strong>
          </p>

          <p>
            <span>身長</span>
            <strong id="character-height">不明</strong>
          </p>

          <p>
            <span>所属</span>
            <strong id="character-group">???</strong>
          </p>

          <p>
            <span>一人称</span>
            <strong id="character-first-person">
            俺
            </strong>
          </p>

          <p>
            <span>二人称</span>
            <strong id="character-second-person">
            君
            </strong>
          </p>

          <p>
            <span>モチーフ</span>
            <strong id="character-motif">
              悪魔
            </strong>
          </p>
        </div>

        <h3>キャラクター紹介</h3>

        <p id="character-description">
          常に穏やかな笑みを浮かべる、正体不明の観測者。相手の行動や思考を静かに分析している。敵なのか味方なのか、本心を知る者はいない。
        </p>

        <div class="author-comment-box">
        <p class="author-comment-label">
          AUTHOR'S COMMENT
        </p>

        <p id="character-author-comment">
          こいつめっちゃ描くの楽だった！！！笑
        </p>
      </div>
      </div>

    </section>

  </main>

  <footer>
    <p>© My Original Character Site</p>
  </footer>

  <!-- JavaScriptファイルを読み込む -->
  <script src="script.js"></script>

</body>
</html>
